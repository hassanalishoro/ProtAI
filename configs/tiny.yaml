# Tiny end-to-end sanity run on tiny_md.hdf5 (20 complexes).
# Goal: verify Lightning trainer + checkpointing + eval work end-to-end.
# NOT a real training run — too small to overfit-check, too few epochs.

data:
  raw_h5: "data/MD/h5_files/tiny_md.hdf5"
  processed_dir: "data/processed_tiny"
  splits_dir: "data/MD/splits"
  train_split: "train_tinyMD.txt"
  val_split: "val_tinyMD.txt"
  test_split: "test_tinyMD.txt"
  edge_cutoff: 4.5
  frame_strategy: "frame_zero"
  keep_trajectory: true

model:
  name: "schnet"
  target: "binding_affinity"
  hidden_dim: 32
  num_layers: 2
  schnet_num_filters: 32
  schnet_num_gaussians: 16
  graph_pool: "mean"

train:
  batch_size: 2
  num_workers: 0       # avoid worker spinup overhead on tiny data
  max_epochs: 5
  learning_rate: 1.0e-3
  weight_decay: 1.0e-5
  optimizer: "adamw"
  grad_clip: 1.0
  loss: "huber"
  lr_schedule: "cosine"
  warmup_epochs: 1
  dropout: 0.1
  seed: 42
  precision: "32"      # mixed precision can be unstable on toy data
  accelerator: "auto"
  devices: "auto"
  early_stop_patience: 100   # don't trigger early stop on this run
  log_dir: "runs"
  run_name: "tiny_sanity"
